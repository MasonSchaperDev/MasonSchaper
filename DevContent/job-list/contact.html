<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Contact Form</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <style>
            body {
                flex-direction: column;
                align-items: center;
                display: flex;
                font-family:Arial, Helvetica, sans-serif;
                background: rgb(63, 55, 64);
                color: #fff;
            }

            .container {
                text-align: center;
                font-size: 20px;
            }

            #contact-form {
                max-width: 700px;
                width: 95%;
                
            }

            label {
                font-size: 18px;
            }

            input {
                width: 96%;
                font-size: 20px;
                margin-bottom: 30px;
                padding: 6px;
                box-shadow: 0 0 5px #2b2b2b;
            }

            input:focus::placeholder {
                color: transparent;

            }

            input::-webkit-input-placeholder {
                font-family: 'myFont', Arial, Helvetica, sans-serif;
            }


            textarea {
                width: 96.3%;
                height: 200px;
                padding: 5px;
                font-size: 16px;
                box-shadow: 0 0 5px #2b2b2b;
            }

            textarea::-webkit-input-placeholder {
                font-family: Arial, Helvetica, sans-serif;
                font-size: 2 8px;

            }

            #submit {
                width: 97.5%;
                margin: 20px 0 0 0.3%;
                background-color: #a7568c;
                color: #fff;
                padding: 10px;
                border: 1px solid #000;
                box-shadow: 0 0 5px #2b2b2b;
                transition: 0.3s ease-in-out;
            }
            
            #submit:hover {
                background-color: #d26bb0;
                cursor: pointer;
            }


        </style>
    </head>

    <body>
        <div class="container">
            <h1>Contact Our Team</h1>
            <p>Contact us about any questions you may have and we'll get back to you momentarily.</p>
        </div>

        <form id="contact-form">
            
            <input type="text" placeholder="Full Name"/>
            
            <input type="text" placeholder="Email"/>
            
            <input type="text" placeholder="Phone"/>

            <textarea name="message" placeholder="Your Message"></textarea>
            <input type="submit" value="Submit" id="submit"/>
        </form>

                <!-- <form action="/submit" method="post">

            <textarea id="message" name="message" rows="5" cols="40" placeholder="Enter your message here"></textarea><br>
            
          </form> -->
        <scripts></scripts>
    </body>
</html>
