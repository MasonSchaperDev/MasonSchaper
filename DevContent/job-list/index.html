<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Job Board</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            margin: 0;
            background: rgb(63, 55, 64);
            color: #fff;
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
        }

        nav {
            width: 100%;
            background-color: #000;
            display: flex;
        }

        nav h1 {
           font-size: 40px;
           padding: 16px 5%;
           margin: 0;
        }   

        #menu-items {
            width: 60%;
        }

        #menu-items button {
            font-size: 18px;
            background-color: transparent;
            color: #fff;
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            padding: 30px;
            transition: 0.3s ease-in;
            border: none;
        }

        #menu-items button:hover {
            cursor: pointer;
            background: rgb(39, 38, 39);
        }

        #job-listings-container {
            margin: 0 4%;
        }

        #job-listings-container h1 {
            text-align: center;
        }

        #job-listings {
            display: flex;
            
        }

        .job {
            margin: 1%;
            border: 1px solid #8a8a8a;
            padding: 5px 30px;
            box-shadow: 0 0 5px #2b2b2b;
            width: 80%;
            background:rgb(55, 48, 56);
        }

        #text {
            display: inline;
        }

        .text-full {
            display: none;
        }

        .toggle {
            color: rgb(142, 142, 213);
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <nav class="nav-bar">
        <h1>Job Board</h1>
        <div id="menu-items">
            <button>Current Job Listings<span></span></button>
            <button>All Job Listings</button>
            <button>Contact</button>
        </div>
    </nav>

    <div id="job-listings-container">
        <h1>Job Listings</h1>
        <div id="job-listings"></div>
    </div>

    <script>
        const jsonData = {
            "jobs":  [
                {
                    "id": 1,
                    "title": "Senior Front-end Developer",
                    "type": "Full-time",
                    "description": {
                        "shortDesc": "We're seeking a talented developer located in Los Angeles.", 
                        "longDesc": "The skill set we're looking for is HTML, CSS, and JS."
                    },
                    "location": "Los Angeles, CA",
                    "salary": "$90k-$100k",
                    "company": {
                        "name": "IDesignTek",
                        "description": "IDesignTek is a leading technology company specializing in web development and digital solutions",
                        "contactEmail": "support@idesigntek.com",
                        "contactPhone": "555-111-6666"
                    }
                },

                {
                    "id": 2,
                    "title": "Junior Full-stack Developer",
                    "type": "Part-time",
                    "description": {
                        "shortDesc": "We're accepting junior developers located in Denver.",
                        "longDesc": " The skill set we're looking for is HTML, CSS, PHP, NODE, AND JS."
                    },
                    "location": "Denver, CO",
                    "salary": "$84k-$93k",
                    "company": {
                        "name": "IDesignTek",
                        "description": "IDesignTek is a leading technology company specializing in web development and digital solutions",
                        "contactEmail": "support@idesigntek.com",
                        "contactPhone": "555-111-6666"
                    }
                },

                {
                    "id": 3,
                    "title": "Junior UX Developer",
                    "type": "Full-time",
                    "description": {
                        "shortDesc": "We're accepting junior UX developers located in Seattle.",
                        "longDesc": "We are looking for somebody who has a good understanding of a website's standards, structure, and design."
                    },
                    "location": "Seattle, WA",
                    "salary": "$74k-$80k",
                    "company": {
                        "name": "IDesignTek",
                        "description": "IDesignTek is a leading technology company specializing in web development and digital solutions",
                        "contactEmail": "support@idesigntek.com",
                        "contactPhone": "555-111-6666"
                    }
                },

                {
                    "id": 4,
                    "title": "Senior UX Developer",
                    "type": "Part-time",
                    "description": "We're looking for experienced UX developers located in Boston, MA. We are looking for somebody who has a very good understanding of a website's standards, structure, design, and can exceed expectations.",
                    "location": "Boston, MA",
                    "salary": "$74k-$80k",
                    "company": {
                        "name": "IDesignTek",
                        "description": "IDesignTek is a leading technology company specializing in web development and digital solutions",
                        "contactEmail": "support@idesigntek.com",
                        "contactPhone": "555-111-6666"
                    }
                },

                {
                    "id": 5,
                    "title": "Senior Back-end Developer",
                    "type": "Full-time",
                    "description": {
                        "shortDesc": "We're looking for Back-end developers located in Boston, MA.",
                        "longDesc": "We require a candidate who's skilled in languages such as Java, Ruby, and other languages."
                    },
                    "location": "Boston, MA",
                    "salary": "$124k-$150k",
                    "company": {
                        "name": "IDesignTek",
                        "description": "IDesignTek is a leading technology company specializing in web development and digital solutions",
                        "contactEmail": "support@idesigntek.com",
                        "contactPhone": "555-111-6666"
                    }
                }
            ]
        };

        const limit = 3;
        const jobListings = document.getElementById('job-listings');

        jsonData.jobs.slice(0, limit).forEach(job => {
            const jobElement = document.createElement('div');
            jobElement.classList.add('job');
            jobElement.innerHTML = `            
            <h2>${job.title}</h2>
            <p><strong>Type: </strong>${job.type}</p>
            <p><strong>Location: </strong>${job.location}</p>
            <p><strong>Salary: </strong>${job.salary}</p>
            <p><strong>Company: </strong>${job.company.name}</p>
            <p><span class="text-short">${job.description.shortDesc}</span> <span class="text-full">${job.description.longDesc}</span> <br> <span class="toggle">More</span></p>
            `;
            jobListings.appendChild(jobElement);
        });

        document.querySelectorAll('.job').forEach(paragraph => {
            const textShort = paragraph.querySelector('.text-short');
            const textFull = paragraph.querySelector('.text-full');
            const toggle = paragraph.querySelector('.toggle');

            toggle.addEventListener('click', () => {
                if (textFull.style.display === 'none' || textFull.style.display === '') {
                    textFull.style.display = 'inline';
                    toggle.textContent = 'Less';
                } else {
                    textShort.style.display = 'inline';
                    textFull.style.display = 'none';
                    toggle.textContent = 'More';
                }
            });
        });

    </script>
</body>
</html>
